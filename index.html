<!DOCTYPE html>
<html lang="he">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yeshurun's Game</title>
    <link rel="icon" type="image/png" href="icon.png" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d0d1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
        }

        #hud {
            display: flex;
            gap: 30px;
            align-items: center;
            margin-bottom: 10px;
            color: #ffd700;
            font-size: 11px;
            text-shadow: 0 0 8px #ffd700aa;
        }

        #hud span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #hearts {
            color: #ff4466;
            text-shadow: 0 0 8px #ff4466aa;
        }

        #gameWrapper {
            position: relative;
            border: 3px solid #ffd70055;
            border-radius: 6px;
            box-shadow: 0 0 40px #ffd70033, 0 0 80px #7700ff22;
            overflow: hidden;
        }

        canvas {
            display: block;
            background: transparent;
        }

        #overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('overlay_bg.png') center/cover no-repeat;
            gap: 20px;
            z-index: 10;
        }

        #overlay h1 {
            color: #ffd700;
            font-size: 22px;
            text-shadow: 0 0 20px #ffd700, 0 0 40px #ff8800;
            text-align: center;
            line-height: 1.6;
        }

        #overlay p {
            color: #aaa;
            font-size: 9px;
            text-align: center;
            line-height: 2;
        }

        #startBtn {
            background: linear-gradient(135deg, #ffd700, #ff8800);
            color: #111;
            border: none;
            border-radius: 4px;
            padding: 12px 30px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 0 20px #ffd70088;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        #startBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #ffd700cc;
        }

        #controls {
            margin-top: 8px;
            color: #888;
            font-size: 8px;
            text-align: center;
            line-height: 2.2;
        }

        #langBtn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255,255,255,0.12);
            border: 2px solid rgba(255,215,0,0.4);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 22px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s, border-color 0.15s;
            line-height: 1;
        }
        #langBtn:hover {
            background: rgba(255,255,255,0.22);
            border-color: rgba(255,215,0,0.8);
            transform: scale(1.1);
        }
        #muteBtn {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(255,255,255,0.12);
            border: 2px solid rgba(255,215,0,0.4);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 22px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s, border-color 0.15s;
            line-height: 1;
            z-index: 100;
        }
        #muteBtn:hover {
            background: rgba(255,255,255,0.22);
            border-color: rgba(255,215,0,0.8);
            transform: scale(1.1);
        }
    
        #pauseTitle {
            font-size: 36px;
            color: #ffffff;
            margin-bottom: 10px;
            text-shadow: 4px 4px #ff4455;
            display: none;
        }
        #pauseSub {
            font-size: 14px;
            color: #ffffff;
            margin-bottom: 40px;
            text-shadow: 2px 2px #000;
            display: none;
        }

        /* Hebrew Specific Font Adjustments */
        body.lang-he #hud-level-label, 
        body.lang-he #hud-enemies-label {
            font-size: 15px; /* Bigger for Hebrew letters */
        }

        body.lang-he #startBtn,
        body.lang-he #resumeBtn,
        body.lang-he #menuBtn {
            font-size: 14px; /* Bigger for Hebrew letters */
        }

        /* Common Button Styles for Pause Menu */
        .btn-pause {
            margin-top: 20px;
            width: 250px;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 12px 10px;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        #resumeBtn {
            background: linear-gradient(135deg, #44ff55, #00aa00);
            box-shadow: 0 0 20px #44ff5588;
        }
        #menuBtn {
            background: linear-gradient(135deg, #ff4455, #aa0000);
            box-shadow: 0 0 20px #ff445588;
        }
        .btn-pause:hover {
            transform: scale(1.05);
        }




    
    </style>
</head>

<body>

    <div id="hud">
        <span id="hearts">❤️❤️❤️❤️❤️</span>
        <span><span id="hud-level-label">📜 Level </span><b id="levelCount">1</b></span>
        <span><span id="hud-enemies-label">💥 Enemies Killed </span><b id="enemiesCount">0</b></span>
    </div>

    <div id="gameWrapper">
        <canvas id="c" width="800" height="450"></canvas>
        <div id="overlay">
            <button id="langBtn" title="Switch Language"></button>
            <button id="muteBtn" title="Mute/Unmute">🔊</button>
            <h1 id="menuTitle">🎮 Yeshurun's Game 🎮</h1>
                <button id="startBtn">Start Game</button>
            <button id="resumeBtn" class="btn-pause" style="display:none;">Return to Game</button>
            <button id="menuBtn" class="btn-pause" style="display:none;">Back to Menu</button>
        </div>
    </div>

    <script>
        // ─── Language System ──────────────────────────────────────────────────────────
        let lang = 'en';
        const STRINGS = {
            en: {
                menuTitle: "🎮 Yeshurun's Game 🎮",
                startBtn: 'Start Game',

                hudLevel: '📜 Level ',
                hudEnemies: '💥 Enemies Killed ',
                killHint: 'Jump on enemies from above to kill them',
                bossAppeared: 'Boss appeared!',
                collectGun: 'Collect the gun to advance',
                gunHint: 'Press SPACE to use the gun',
                itemsLeft: (n) => `${n} diamonds to meet the ${level === 5 ? 'bosses' : 'boss'}`,
                killBoss: 'Defeat the boss to continue',
                killBossFinal: 'Defeat the bosses to win',
                dead: '💀 Game Over 💀',
                pressSpace: 'Press SPACE to try again',
                win: (lvl) => `✨ Level ${lvl} Complete! ✨`,
                nextLevel: 'Press SPACE for next level',
                victory: '🏆 You Win! 🏆',
                victoryScore: () => `Press SPACE for new game`,
                paused: '⏸ Paused',
                unpause: 'Press ESC to resume',
                resumeBtn: 'Return to Game',
                backToMenu: 'Back to Menu',
                cheatGun: 'Cheat: Gun activated!',
                cheatHp: 'Cheat: Max Health!',
                goDoor: 'Go through the door to complete the level',
                goDoorFinal: 'Go through the door to complete the game',
            },
            he: {
                menuTitle: '🎮 המשחק של ישרון 🎮',
                startBtn: 'התחל משחק',

                hudLevel: '📜 שלב ',
                hudEnemies: '💥 אויבים שחוסלו ',
                killHint: 'כדי להרוג את המפלצות קפוץ עליהן מלמעלה',
                bossAppeared: 'הבוס הופיע!',
                collectGun: 'אסוף את הרובה כדי לעבור שלב',
                gunHint: 'כדי להשתמש ברובה לחץ רווח',
                itemsLeft: (n) => `${n} יהלומים כדי לפגוש את ${level === 5 ? 'הבוסים' : 'הבוס'}`,
                killBoss: 'הבס את הבוס כדי להמשיך',
                killBossFinal: 'הבס את הבוסים כדי לנצח',
                dead: '💀 הפסדת 💀',
                pressSpace: 'לחץ רווח כדי לנסות שוב',
                win: (lvl) => `✨ שלב ${lvl} הושלם! ✨`,
                nextLevel: 'לחץ רווח לשלב הבא',
                victory: '🏆 ניצחת! 🏆',
                victoryScore: () => `לחץ רווח למשחק חדש`,
                paused: '⏸ הופסק',
                unpause: 'לחץ ESC כדי להמשיך',
                resumeBtn: 'חזור למשחק',
                backToMenu: 'חזרה לתפריט הראשי',
                cheatGun: "צ'יט: אקדח פעיל!",
                cheatHp: "צ'יט: חיים מלאים!",
            }
        };
        function T(key, ...args) {
            const val = STRINGS[lang][key];
            return typeof val === 'function' ? val(...args) : val;
        }
        // SVG flag data URIs (cross-platform, no emoji rendering issues)
        const _svgIL = `<svg xmlns="http://www.w3.org/2000/svg" width="44" height="30"><rect width="44" height="30" fill="white"/><rect y="4.5" width="44" height="5.5" fill="#0038b8"/><rect y="20" width="44" height="5.5" fill="#0038b8"/><polygon points="22,10.5 26.5,18 17.5,18" fill="none" stroke="#0038b8" stroke-width="1.6"/><polygon points="22,19.5 26.5,12 17.5,12" fill="none" stroke="#0038b8" stroke-width="1.6"/></svg>`;
        const _svgUS = `<svg xmlns="http://www.w3.org/2000/svg" width="44" height="30"><rect width="44" height="30" fill="#b22234"/><rect y="2.3" width="44" height="2.3" fill="white"/><rect y="6.9" width="44" height="2.3" fill="white"/><rect y="11.5" width="44" height="2.3" fill="white"/><rect y="16.2" width="44" height="2.3" fill="white"/><rect y="20.8" width="44" height="2.3" fill="white"/><rect y="25.4" width="44" height="2.3" fill="white"/><rect width="17.5" height="16.2" fill="#3c3b6e"/><g fill="white"><circle cx="2.2" cy="1.5" r="0.9"/><circle cx="5.2" cy="1.5" r="0.9"/><circle cx="8.2" cy="1.5" r="0.9"/><circle cx="11.2" cy="1.5" r="0.9"/><circle cx="14.2" cy="1.5" r="0.9"/><circle cx="3.7" cy="3.8" r="0.9"/><circle cx="6.7" cy="3.8" r="0.9"/><circle cx="9.7" cy="3.8" r="0.9"/><circle cx="12.7" cy="3.8" r="0.9"/><circle cx="2.2" cy="6.1" r="0.9"/><circle cx="5.2" cy="6.1" r="0.9"/><circle cx="8.2" cy="6.1" r="0.9"/><circle cx="11.2" cy="6.1" r="0.9"/><circle cx="14.2" cy="6.1" r="0.9"/><circle cx="3.7" cy="8.4" r="0.9"/><circle cx="6.7" cy="8.4" r="0.9"/><circle cx="9.7" cy="8.4" r="0.9"/><circle cx="12.7" cy="8.4" r="0.9"/><circle cx="2.2" cy="10.7" r="0.9"/><circle cx="5.2" cy="10.7" r="0.9"/><circle cx="8.2" cy="10.7" r="0.9"/><circle cx="11.2" cy="10.7" r="0.9"/><circle cx="14.2" cy="10.7" r="0.9"/><circle cx="3.7" cy="13" r="0.9"/><circle cx="6.7" cy="13" r="0.9"/><circle cx="9.7" cy="13" r="0.9"/><circle cx="12.7" cy="13" r="0.9"/></g></svg>`;
        const _flagIL = 'data:image/svg+xml;base64,' + btoa(_svgIL);
        const _flagUS = 'data:image/svg+xml;base64,' + btoa(_svgUS);
        function _flagImg(src) {
            return `<img src="${src}" width="44" height="30" style="vertical-align:middle;border-radius:3px;display:block;">`;
        }
        function applyLangToMenu() {
            document.body.classList.toggle('lang-he', lang === 'he');
            document.getElementById('menuTitle').textContent = T('menuTitle');
            document.getElementById('startBtn').textContent = T('startBtn');
            document.getElementById('menuBtn').textContent = T('backToMenu');
            document.getElementById('resumeBtn').textContent = T('resumeBtn');
            document.getElementById('hud-level-label').textContent = T('hudLevel');
            document.getElementById('hud-enemies-label').textContent = T('hudEnemies');
            // Show the flag of the OTHER language (clicking switches to it)
            document.getElementById('langBtn').innerHTML = lang === 'en' ? _flagImg(_flagIL) : _flagImg(_flagUS);
        }
        applyLangToMenu(); // set initial state on page load
        document.getElementById('langBtn').addEventListener('click', () => {
            lang = lang === 'en' ? 'he' : 'en';
            applyLangToMenu();
        });
        document.getElementById('muteBtn').addEventListener('click', () => {
            SND.muted = !SND.muted;
            if (SND.bgMusic) SND.bgMusic.muted = SND.muted;
            document.getElementById('muteBtn').textContent = SND.muted ? '🔇' : '🔊';
        });
 
        // ─── Audio System (Retro SFX) ──────────────────────────────────────────────────
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        const SND = {
            muted: false,
            bgMusic: null,
            init() { 
                if (!audioCtx) audioCtx = new AudioContext(); 
                if (!this.bgMusic) {
                    this.bgMusic = new Audio('soundtraclittai.mp3');
                    this.bgMusic.loop = true;
                    this.bgMusic.volume = 0.3;
                }
                this.resumeMusic();
            },
            pauseMusic() { if (this.bgMusic) this.bgMusic.pause(); },
            resumeMusic() { if (this.bgMusic && !this.muted) this.bgMusic.play().catch(e => {}); },
            stopMusic() { if (this.bgMusic) { this.bgMusic.pause(); this.bgMusic.currentTime = 0; } },
            osc(f, d, t, v, rampF = 0) {
                if (!audioCtx || this.muted) return;
                try {
                    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
                    if (rampF > 0) o.frequency.exponentialRampToValueAtTime(rampF, audioCtx.currentTime + d);
                    g.gain.setValueAtTime(v, audioCtx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
                    o.connect(g); g.connect(audioCtx.destination);
                    o.start(); o.stop(audioCtx.currentTime + d);
                } catch(e) {}
            },
            noise(d, v) {
                if (!audioCtx || this.muted) return;
                try {
                    const bufSize = audioCtx.sampleRate * d, buffer = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate), data = buffer.getChannelData(0);
                    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
                    const src = audioCtx.createBufferSource(), g = audioCtx.createGain();
                    src.buffer = buffer; g.gain.setValueAtTime(v, audioCtx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
                    src.connect(g); g.connect(audioCtx.destination);
                    src.start();
                } catch(e) {}
            },
            shoot() { this.osc(800, 0.1, 'sine', 0.1, 100); this.noise(0.05, 0.05); },
            coin() { this.osc(1200, 0.2, 'sine', 0.08, 1400); },
            heart() { this.osc(600, 0.4, 'sine', 0.12, 750); },
            hit() { this.osc(120, 0.2, 'triangle', 0.15, 60); },
            win(isFinal) {
                const notes = isFinal 
                    ? [261, 329, 392, 523, 329, 392, 523, 659, 392, 523, 659, 783, 523, 659, 783, 1046, 1318]
                    : [261, 329, 392, 523, 392, 523, 659];
                const delay = isFinal ? 200 : 300;
                notes.forEach((f, i) => {
                    setTimeout(() => this.osc(f, 0.8, 'sine', 0.06, f * 1.02), i * delay);
                });
            },
            kill() { this.noise(0.15, 0.1); this.osc(100, 0.15, 'triangle', 0.1); },
            bossAppeared() {
                this.osc(120, 0.6, 'sawtooth', 0.15, 60);
                setTimeout(() => this.osc(90, 0.8, 'sawtooth', 0.15, 40), 250);
            },
            fall() { this.osc(400, 0.6, 'sine', 0.1, 100); },
            bossDie() {
                this.noise(0.8, 0.2);
                this.osc(150, 0.5, 'sawtooth', 0.1, 40);
                setTimeout(() => this.osc(100, 0.5, 'sawtooth', 0.1, 20), 200);
            }
        };

        // ─── Canvas setup ─────────────────────────────────────────────────────────────
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;

        const winBgImg = new Image();
        winBgImg.src = 'win_bg.png';
        const levelBgImg = new Image();
        levelBgImg.src = 'level_bg.png';
        const level2BgImg = new Image();
        level2BgImg.src = 'level2_bg.png';

        // ─── Game state ───────────────────────────────────────────────────────────────
        let state = 'menu'; // menu | playing | dead | win
        let level = 1, enemiesKilled = 0;
        const MAX_LEVELS = 5;

        // ─── Input ────────────────────────────────────────────────────────────────────
        const keys = {};
        document.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) e.preventDefault();

            if (state === 'menu' && (e.code === 'Space' || e.code === 'Enter')) {
                startGame();
            }

            // Cheat code: Shift + G to get gun
            if ((keys['ShiftLeft'] || keys['ShiftRight']) && keys['KeyG']) {
                if (state === 'playing' && player) {
                    player.hasGun = true;
                    globalHasGun = true;
                    spawnFloatingText(player.x, player.y - 30, T('cheatGun'), '#ffd700', 60);
                }
            }
            // Cheat code: Shift + Y + S to skip level
            if ((keys['ShiftLeft'] || keys['ShiftRight']) && keys['KeyY'] && keys['KeyS']) {
                if (state === 'playing') {
                    state = 'win';

                    if (player) spawnParticles(player.x + player.w / 2, player.y, '#ffd700', 30);
                }
            }
            // Cheat code: Shift + S + R + H for max health
            if ((keys['ShiftLeft'] || keys['ShiftRight']) && keys['KeyS'] && keys['KeyR'] && keys['KeyH']) {
                if (state === 'playing' && player) {
                    player.hp = player.maxHp;
                    spawnFloatingText(player.x, player.y - 30, T('cheatHp'), '#ff4466', 60);
                    spawnParticles(player.x + player.w / 2, player.y, '#ff4466', 30);
                }
            }
        });
        document.addEventListener('keyup', e => { keys[e.code] = false; });

        // ─── Helpers ──────────────────────────────────────────────────────────────────
        const lerp = (a, b, t) => a + (b - a) * t;
        const rand = (a, b) => Math.random() * (b - a) + a;
        const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

        // ─── Color palette ────────────────────────────────────────────────────────────
        let PAL = {};
        const LEVEL_PALETTES = [
            { // 1: Desert Night
                sky1: '#100022', sky2: '#2a0a55', mountain: 'rgba(80,20,120,0.5)', dune: 'rgba(180,110,30,0.35)',
                sandLight: '#e8c97a', sandDark: '#c6973f', stone: '#5a5a7a', stoneShadow: '#3a3a55',
                moving: '#d1c4e9', movingShadow: '#7e57c2', // Gorgeous light violet / deep purple
                enemy1: '#ff4455', enemy2: '#cc2233', spike: '#aaa'
            },
            { // 2: Crimson Volcano
                sky1: '#220000', sky2: '#550a0a', mountain: 'rgba(120,20,20,0.5)', dune: 'rgba(180,50,30,0.35)',
                sandLight: '#c44536', sandDark: '#772e25', stone: '#4a3030', stoneShadow: '#221515',
                moving: '#ffe082', movingShadow: '#ffb300', // Sparkling warm gold / glowing amber
                enemy1: '#ff9900', enemy2: '#cc5500', spike: '#ccc'
            },
            { // 3: Toxic Jungle
                sky1: '#001a00', sky2: '#0a3311', mountain: 'rgba(20,80,30,0.5)', dune: 'rgba(50,120,40,0.35)',
                sandLight: '#556b2f', sandDark: '#2e3b19', stone: '#405040', stoneShadow: '#202820',
                moving: '#80deea', movingShadow: '#00acc1', // High-contrast glowing cyan / toxic teal
                enemy1: '#9932cc', enemy2: '#4b0082', spike: '#bbb'
            },
            { // 4: Ice Cavern
                sky1: '#001a33', sky2: '#0a3a66', mountain: 'rgba(60,100,150,0.5)', dune: 'rgba(150,200,240,0.35)',
                sandLight: '#e0f7fa', sandDark: '#80deea', stone: '#607d8b', stoneShadow: '#37474f',
                moving: '#ff80ab', movingShadow: '#f50057', // Vivid neon pink / glowing fuchsia
                enemy1: '#ffffff', enemy2: '#b0bec5', spike: '#88ccff'
            },
            { // 5: Golden Temple
                sky1: '#332000', sky2: '#664400', mountain: 'rgba(150,120,40,0.5)', dune: 'rgba(240,200,80,0.35)',
                sandLight: '#ffeb3b', sandDark: '#fbc02d', stone: '#fff59d', stoneShadow: '#f57f17',
                moving: '#82b1ff', movingShadow: '#2979ff', // Celestial neon blue / electric azure
                enemy1: '#000000', enemy2: '#333333', spike: '#ffd700'
            }
        ];
        const COMMON_PAL = {
            playerBody: '#ffd700', playerSword: '#c0e0ff',
            coin: '#ffe066', gem: '#00eeff', door: '#ffd700', particle: '#ffd700'
        };
        function setLevelPalette(lvl) {
            PAL = { ...COMMON_PAL, ...LEVEL_PALETTES[Math.min(lvl - 1, LEVEL_PALETTES.length - 1)] };
        }
        setLevelPalette(1); // initialize for menu

        // ─── Particle system ──────────────────────────────────────────────────────────
        let particles = [];
        function spawnParticles(x, y, color, n = 8) {
            for (let i = 0; i < n; i++) {
                const a = rand(0, Math.PI * 2);
                const spd = rand(1.5, 4);
                particles.push({
                    x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
                    life: 1, color, size: rand(2, 5)
                });
            }
        }
        function updateParticles() {
            if (particles.length > 150) particles.splice(0, particles.length - 150);
            particles = particles.filter(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.035;
                return p.life > 0;
            });
        }
        function drawParticles(cam) {
            ctx.save();
            particles.forEach(p => {
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x - cam, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.restore();
        }

        // ─── Floating Text ────────────────────────────────────────────────────────────
        let floatingTexts = [];
        function spawnFloatingText(x, y, text, color = '#ffd700', life = 60) {
            floatingTexts.push({ x, y, text, color, life: life, maxLife: life });
        }
        function updateFloatingTexts() {
            if (floatingTexts.length > 50) floatingTexts.splice(0, floatingTexts.length - 50);
            floatingTexts = floatingTexts.filter(ft => {
                ft.y -= 0.5;
                ft.life--;
                return ft.life > 0;
            });
        }
        function drawFloatingTexts(cam) {
            floatingTexts.forEach(ft => {
                ctx.save();
                const alpha = ft.maxLife > 0 ? ft.life / ft.maxLife : 0;
                ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
                ctx.fillStyle = ft.color;
                ctx.font = (lang === 'he' ? '15px' : '10px') + ' "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.fillText(ft.text, ft.x - cam, ft.y);
                ctx.restore();
            });
        }

        // Sword system removed

        // ─── Bullets & Guns ───────────────────────────────────────────────────────────
        let bullets = [];
        function spawnEnemyBullet(en, color = '#ffaa44', targetX = null, targetY = null, round = false) {
            const bulletOffset = en.isBig ? en.h * 0.65 : (en.isPerson ? en.h * 0.3 : 16);
            const bulletY = en.y + bulletOffset;
            const bx = en.x + (en.dir > 0 ? en.w : -8);
            let bvx = en.dir * (en.isBig ? 6 : 4);
            let bvy = 0;

            if (targetX !== null && targetY !== null) {
                const angle = Math.atan2(targetY - bulletY, targetX - bx);
                const speed = en.isBig ? 5 : 4;
                bvx = Math.cos(angle) * speed;
                bvy = Math.sin(angle) * speed;
            }

            const isBanana = en.isPerson;
            bullets.push({
                x: bx, y: bulletY, vx: bvx, vy: bvy,
                w: isBanana ? (en.isBig ? 18 : 12) : (en.isBig ? 12 : 8),
                h: isBanana ? (en.isBig ? 10 : 7) : (en.isBig ? 6 : 4),
                life: en.isBig ? 150 : 120, fromEnemy: true, 
                color: isBanana ? '#ffee58' : color, 
                round: round,
                isBanana: isBanana
            });
            spawnParticles(bx, bulletY, isBanana ? '#ffd54f' : color, en.isBig ? 8 : 4);
        }

        function updateBullets(enemies, pl) {
            if (bullets.length > 100) bullets.splice(0, bullets.length - 100);
            bullets = bullets.filter(b => {
                b.x += b.vx;
                b.y += (b.vy || 0);
                b.life--;

                if (b.fromEnemy) {
                    const pRect = { x: pl.x, y: pl.y, w: pl.w, h: pl.h };
                    if (pl.isCrouching) { pRect.h = 20; pRect.y += 31; }
                    if (isOverlap(b, pRect) && pl.invincible === 0) {
                        pl.hp--;
                        pl.invincible = 40;
                        spawnParticles(pl.x + pl.w / 2, pl.y, '#ff4455', 8);
                        if (pl.hp <= 0) { pl.dead = true; state = 'dead'; }
                        return false;
                    }
                } else {
                    let hitEnemy = false;
                    for (const en of enemies) {
                        if (en.dead || en.waitingForItems) continue;
                        if (isOverlap(b, en)) {
                            en.hp -= 1;
                            en.stunTimer = 15;
                            spawnParticles(en.x + en.w / 2, en.y + en.h / 2, '#ffffaa', 6);
                            if (en.hp <= 0) {
                                en.dead = true;
                                enemiesKilled++;
                                spawnParticles(en.x + en.w / 2, en.y, '#ff8800', 14);
                                if (!en.isBig) spawnFloatingText(en.x + en.w / 2, en.y, '+1');
                                if (en.isBig) SND.bossDie(); else SND.kill();
                            } else { SND.hit(); }
                            hitEnemy = true;
                            break;
                        }
                    }
                    if (hitEnemy) return false;
                }
                return b.life > 0;
            });
        }
        function drawBullets(cam) {
            bullets.forEach(b => {
                const color = b.color || (b.fromEnemy ? '#ffaa44' : '#ffffaa');
                ctx.fillStyle = color;
                if (b.isBanana) {
                    // Draw a peeled banana fruit (soft yellow crescent shape!)
                    ctx.save();
                    ctx.translate(b.x - cam + b.w / 2, b.y + b.h / 2);
                    
                    // Rotate the banana based on its flight direction/velocity
                    const angle = Math.atan2(b.vy || 0, b.vx);
                    ctx.rotate(angle);
                    
                    // Curved banana body (peeled fruit is a clean soft pale yellow/white)
                    ctx.fillStyle = '#fffde7'; // Pale yellow inside fruit
                    ctx.beginPath();
                    ctx.arc(0, 0, b.w / 2, -Math.PI * 0.3, Math.PI * 0.3);
                    ctx.quadraticCurveTo(0, b.h / 2, -b.w / 2, 0);
                    ctx.quadraticCurveTo(0, -b.h / 2, b.w / 2, -Math.PI * 0.3);
                    ctx.closePath();
                    ctx.fill();
                    
                    // Add a tiny yellow-orange peel tip remnants
                    ctx.fillStyle = '#ffe082';
                    ctx.fillRect(b.w / 3, -1, 3, 2);
                    
                    ctx.restore();
                } else if (b.round) {
                    // Round bullet (Level 1 Boss)
                    ctx.beginPath();
                    ctx.arc(b.x - cam + b.w / 2, b.y + b.h / 2, b.w / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.beginPath();
                    ctx.arc(b.x - cam + b.w / 3, b.y + b.h / 3, b.w / 4, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // Rect bullet for player and other enemies
                    ctx.fillRect(b.x - cam, b.y, b.w, b.h);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(b.x - cam + (b.vx !== undefined && b.vx > 0 ? 0 : 2), b.y + 1, b.w - 2, b.h - 2);
                }
            });
        }

        function drawGunItem(g, cam, t) {
            if (g.collected) return;
            const x = g.x - cam, y = g.y + Math.sin(t * 0.05) * 3;
            ctx.save();

            // Golden Ring Highlight
            ctx.beginPath();
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 2]);
            ctx.arc(x + 10, y + 5, 22 + Math.sin(t * 0.1) * 3, 0, Math.PI * 2);
            ctx.stroke();

            ctx.fillStyle = '#444';
            ctx.fillRect(x, y, 16, 6);
            ctx.fillStyle = '#222';
            ctx.fillRect(x, y, 6, 10);
            ctx.fillStyle = '#ffffaa';
            ctx.fillRect(x + 14, y + 1, 4, 4);
            ctx.restore();
        }

        // ─── Camera ───────────────────────────────────────────────────────────────────
        let cam = 0;
        function updateCam(player, worldW) {
            const target = player.x - W / 2;
            cam = clamp(lerp(cam, target, 0.12), 0, worldW - W);
        }

        // ─── Level definitions ────────────────────────────────────────────────────────
        function makeLevelData(lvl) {
            // platforms: {x,y,w,h, type:'stone'|'sand'}
            // Each level is wider
            const worldW = (lvl === 4) ? 2800 : (lvl === 5) ? 4200 : 2800 + lvl * 800;

            let platforms = [];
            let guns = [];
            // Ground chunks procedurally generated without overlapping
            const groundY = H - 40;
            const minPit = 55; // Ensure player (22px) can easily fall through
            const maxPit = lvl === 1 ? 90 : (lvl === 2 ? 115 : 140); // 90px for Level 1, 115px for Level 2, 140px for Levels 3-5 (great for the triple jump mechanic!)

            // Starting platform (safe zone)
            platforms.push({ x: 0, y: groundY, w: 300, h: 40, type: 'sand' });

            // Intermediate platforms with strict mathematical boundaries and zero overlapping
            let gx = 300;
            const endZoneStart = worldW - 800;

            while (gx < endZoneStart) {
                const remaining = endZoneStart - gx;

                if (remaining < minPit + 120) {
                    // Not enough space for another pit and platform: extend the last platform to reach the exit zone
                    if (platforms.length > 0) {
                        platforms[platforms.length - 1].w += remaining;
                    }
                    break;
                } else if (remaining < maxPit + 260) {
                    // Exactly enough space for one last pit and one last platform
                    const maxP = Math.min(maxPit, remaining - 120);
                    const pitW = rand(minPit, maxP) | 0;
                    const lastPlatformX = gx + pitW;
                    
                    platforms.push({ x: lastPlatformX, y: groundY, w: endZoneStart - lastPlatformX, h: 40, type: 'sand' });
                    break;
                } else {
                    // General case step
                    const pitW = rand(minPit, maxPit) | 0;
                    const nextX = gx + pitW;
                    const gw = rand(120, 260) | 0;
                    
                    platforms.push({ x: nextX, y: groundY, w: gw, h: 40, type: 'sand' });
                    gx = nextX + gw;
                }
            }

            // Final platform (safe zone) starting exactly at endZoneStart
            platforms.push({ x: endZoneStart, y: groundY, w: 800, h: 40, type: 'sand' });

            // Helper: Check if a platform overlaps with any ground pit
            const isAbovePit = (px, pw) => {
                for (let xCoord = px; xCoord <= px + pw; xCoord += 5) {
                    let hasGround = false;
                    for (const p of platforms) {
                        if (p.y === groundY && xCoord >= p.x && xCoord <= p.x + p.w) {
                            hasGround = true;
                            break;
                        }
                    }
                    if (!hasGround) return true;
                }
                return false;
            };

            // Floating platforms (Generated sequentially with at least 35px gap to prevent stacking, and mathematically distributing >=40% low & >=40% high)
            let floatSpans = [];
            let currX = 300;
            const floatEnd = worldW - 850;
            const targetFloat = (14 + lvl * 4) - (lvl === 4 ? 8 : 0);
            const avgStep = (floatEnd - currX) / targetFloat;

            for (let i = 0; i < targetFloat; i++) {
                const pw = rand(60, 130) | 0;
                const minGap = 35; // Guarantee at least 35px horizontal gap!
                const maxGap = Math.max(35, avgStep - pw + 15);
                const gap = rand(minGap, maxGap) | 0;
                const px = currX + gap;
                
                if (px + pw > floatEnd) break;
                
                floatSpans.push({ x: px, w: pw });
                currX = px + pw;
            }

            const N = floatSpans.length;
            const minHigh = Math.ceil(N * 0.4);
            const minLow = Math.ceil(N * 0.4);
            
            let forcedHighIndices = [];
            let customizableIndices = [];
            
            for (let i = 0; i < N; i++) {
                const span = floatSpans[i];
                if (isAbovePit(span.x, span.w)) {
                    forcedHighIndices.push(i);
                } else {
                    customizableIndices.push(i);
                }
            }
            
            const F = forcedHighIndices.length;
            const C = customizableIndices.length;
            
            let customizableHeights = [];
            let neededLow = Math.min(C, minLow);
            let neededHigh = Math.max(0, minHigh - F);
            neededHigh = Math.min(C - neededLow, neededHigh);
            
            // Fill required percentages
            for (let i = 0; i < neededLow; i++) customizableHeights.push(285);
            for (let i = 0; i < neededHigh; i++) customizableHeights.push(210);
            
            // Fill remaining customizable slots randomly
            const remainingSlots = C - customizableHeights.length;
            for (let i = 0; i < remainingSlots; i++) {
                customizableHeights.push(Math.random() < 0.5 ? 210 : 285);
            }
            
            // Shuffle customizable heights to randomize distribution
            for (let i = customizableHeights.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const temp = customizableHeights[i];
                customizableHeights[i] = customizableHeights[j];
                customizableHeights[j] = temp;
            }
            
            // Create final floating platforms
            for (let i = 0; i < N; i++) {
                const span = floatSpans[i];
                let py;
                if (forcedHighIndices.includes(i)) {
                    py = 210; // Forced above pit
                } else {
                    py = customizableHeights.pop();
                }
                
                // End level boss zone platforms are always high
                if ((lvl === 4 || lvl === 5) && span.x > worldW * 0.7) {
                    py = 210;
                }
                
                const pType = Math.random() < 0.5 ? 'stone' : 'sand';
                const newP = { x: span.x, y: py, w: span.w, h: 14, type: pType };
                if (pType === 'stone') {
                    newP.bricks = Array.from({ length: Math.ceil(span.w / 12) }, (_, k) => ({
                        x: span.x + k * 12,
                        w: 12,
                        timer: null,
                        gone: false
                    }));
                }
                platforms.push(newP);
            }

            // Moving platforms (Strict grid heights)
            const numMoving = (2 + lvl) - (lvl === 4 ? 2 : 0);
            for (let i = 0; i < numMoving; i++) {
                const px = rand(400, worldW - 400) | 0;
                
                let py;
                if (isAbovePit(px, 240)) {
                    py = 210; // Strictly 150px above ground when moving over a pit
                } else {
                    py = Math.random() < 0.5 ? 210 : 285; // 150px or 75px above ground
                }
                
                platforms.push({
                    x: px, y: py, w: 90, h: 14, type: 'stone',
                    moving: true, mx0: px, mx1: px + rand(80, 150) | 0, mspd: rand(0.6, 1.2) * (Math.random() < 0.5 ? 1 : -1)
                });
            }

            // Spikes removed from the game
            let spikes = [];

            // Coins
            let coinsArr = [];
            for (let i = 0; i < (14 + lvl * 4) - (lvl === 4 ? 9 : 0); i++) {
                coinsArr.push({ x: rand(200, worldW - 200) | 0, y: rand(H - 300, H - 80) | 0, collected: false });
            }

            // Gems (worth more)
            let gems = [];
            for (let i = 0; i < (3 + lvl * 2) + (lvl === 4 ? 3 : 0); i++) {
                gems.push({ x: rand(300, worldW - 300) | 0, y: rand(H - 280, H - 120) | 0, collected: false, bob: rand(0, Math.PI * 2) });
            }

            // Hearts (restore life)
            let heartsArr = [];
            for (let i = 0; i < 2 + lvl; i++) {
                heartsArr.push({ x: rand(400, worldW - 400) | 0, y: rand(H - 250, H - 100) | 0, collected: false });
            }

            // Enemies
            let enemies = [];
            if (lvl < 4) {
                const numEnemy = 3 + lvl * 2;
                for (let i = 0; i < numEnemy; i++) {
                    const ex = rand(400, worldW - 400) | 0;
                    enemies.push({
                        x: ex, y: groundY - 32 - 3, w: 28, h: 32,
                        vx: (Math.random() < 0.5 ? 1 : -1) * (0.7 + lvl * 0.2),
                        vy: 0, onGround: false,
                        hp: 2, maxHp: 2,
                        stunTimer: 0, dead: false,
                        patrolX0: ex - 80, patrolX1: ex + 80,
                        dir: 1, walkAnim: 0
                    });
                }
            } else if (lvl === 4) {
                // Ground people
                for (let i = 0; i < 3; i++) {
                    const ex = rand(600, worldW - 400) | 0;
                    enemies.push({
                        x: ex, y: groundY - 36, w: 22, h: 51,
                        vx: (Math.random() < 0.5 ? 1 : -1) * 1.2,
                        vy: 0, onGround: false,
                        isPerson: true,
                        shootCooldown: rand(60, 240) | 0,
                        hp: 4, maxHp: 4,
                        stunTimer: 0, dead: false,
                        patrolX0: ex - 200, patrolX1: ex + 200,
                        dir: 1, walkAnim: 0
                    });
                }
                // Platform people
                for (const p of platforms) {
                    if (p.w > 60 && Math.random() < 0.15) {
                        const ex = p.x + p.w / 2 - 11;
                        enemies.push({
                            x: ex, y: p.y - 36, w: 22, h: 51,
                            vx: (Math.random() < 0.5 ? 1 : -1) * 1.0,
                            vy: 0, onGround: false,
                            isPerson: true,
                            shootCooldown: rand(60, 240) | 0,
                            hp: 4, maxHp: 4,
                            stunTimer: 0, dead: false,
                            patrolX0: p.x + 5, patrolX1: p.x + p.w - 27,
                            dir: 1, walkAnim: 0
                        });
                    }
                }
            }

            // Exit door
            const doorX = worldW - 180;
            const door = { x: doorX, y: groundY - 64, w: 36, h: 64, open: false };

            if (lvl === 1) {
                enemies.push({
                    x: doorX - 80, y: groundY - 64 - 3, w: 56, h: 64,
                    vx: -1.2, vy: 0, onGround: false,
                    hp: 12, maxHp: 12, stompDropsHp: 4, isBig: true, hoverAboveGround: true,
                    stunTimer: 0, dead: false,
                    patrolX0: doorX - 700, patrolX1: doorX - 20,
                    dir: 1, walkAnim: 0,
                    waitingForItems: true
                });
            }

            if (lvl === 4) {
                // Boss Person for Level 4
                enemies.push({
                    x: doorX - 100, y: groundY - 72, w: 44, h: 72,
                    vx: 1.5, vy: 0, onGround: false,
                    isPerson: true, isBig: true,
                    shootCooldown: 180,
                    hp: 30, maxHp: 30,
                    stunTimer: 0, dead: false,
                    patrolX0: doorX - 450, patrolX1: doorX,
                    dir: -1, walkAnim: 0,
                    waitingForItems: true,
                    ghostMode: true, baseY: groundY - 72
                });
            }

            if (lvl === 2) {
                for (let i = 0; i < 4; i++) {
                    const ex = rand(300, worldW - 300) | 0;
                    const ey = rand(H - 350, H - 200) | 0;
                    enemies.push({
                        x: ex, y: ey, baseY: ey, w: 24, h: 20,
                        vx: (Math.random() < 0.5 ? 1 : -1) * 1.5,
                        vy: 0, onGround: false, isBat: true,
                        hp: 1, maxHp: 1,
                        stunTimer: 0, dead: false,
                        patrolX0: ex - 150, patrolX1: ex + 150,
                        dir: 1, walkAnim: rand(0, Math.PI * 2)
                    });
                }

                enemies.push({
                    x: doorX - 100, y: groundY - 60, baseY: groundY - 60, w: 48, h: 40,
                    vx: -1.5, vy: 0, onGround: false, isBat: true, isBig: true,
                    hp: 24, maxHp: 24, stompDropsHp: 4,
                    stunTimer: 0, dead: false,
                    patrolX0: doorX - 180, patrolX1: doorX - 20,
                    dir: 1, walkAnim: 0,
                    waitingForItems: true
                });
            }

            if (lvl === 3) {
                for (let i = 0; i < 8; i++) {
                    const segment = (worldW - 800) / 8;
                    const ex = (500 + i * segment + Math.random() * segment) | 0;
                    const ey = rand(H - 350, H - 200) | 0;
                    enemies.push({
                        x: ex, y: ey, baseY: ey, w: 24, h: 20,
                        vx: (Math.random() < 0.5 ? 1 : -1) * 1.5,
                        vy: 0, onGround: false, isBat: true, chasePlayer: true,
                        hp: 1, maxHp: 1,
                        stunTimer: 0, dead: false,
                        patrolX0: ex - 200, patrolX1: ex + 200,
                        dir: 1, walkAnim: rand(0, Math.PI * 2)
                    });
                }

                enemies.push({
                    x: doorX - 100, y: H - 300, baseY: H - 300, w: 48, h: 40,
                    vx: 0, vy: 0, onGround: false, isBat: true, isBig: true, hitAndRun: true,
                    aiState: 'retreat', aiTimer: 60,
                    hp: 12, maxHp: 12, stompDropsHp: 4,
                    stunTimer: 0, dead: false,
                    patrolX0: doorX - 250, patrolX1: doorX,
                    dir: 1, walkAnim: 0,
                    waitingForItems: true
                });
            }
            if (lvl === 5) {
                // More Persons
                for (let i = 0; i < 7; i++) {
                    const ex = rand(600, worldW - 800) | 0;
                    enemies.push({
                        x: ex, y: groundY - 36, w: 22, h: 51,
                        vx: (Math.random() < 0.5 ? 1 : -1) * 1.2,
                        vy: 0, onGround: false,
                        isPerson: true, shootCooldown: rand(60, 240) | 0,
                        hp: 4, maxHp: 4, dead: false,
                        patrolX0: ex - 200, patrolX1: ex + 200,
                        dir: 1, walkAnim: 0
                    });
                }
                // More Bats - Gradual chase implemented in AI
                for (let i = 0; i < 12; i++) {
                    const ex = rand(500, worldW - 600) | 0;
                    const ey = rand(H - 350, H - 180) | 0;
                    enemies.push({
                        x: ex, y: ey, baseY: ey, w: 24, h: 20,
                        vx: (Math.random() < 0.5 ? 1 : -1) * 1.5,
                        vy: 0, onGround: false, isBat: true, chasePlayer: true,
                        hp: 1, maxHp: 1, dead: false,
                        patrolX0: ex - 200, patrolX1: ex + 200,
                        dir: 1, walkAnim: rand(0, Math.PI * 2)
                    });
                }
                // Extra coins/gems for Level 5 (reduced by 25%: was 15, now 11)
                for (let i = 0; i < 11; i++) {
                    coinsArr.push({ x: rand(400, worldW - 400), y: groundY - 20, collected: false });
                    gems.push({ x: rand(400, worldW - 400), y: rand(H - 300, H - 150), collected: false });
                }

                // 3 Bosses
                // Boss 1: Monster (Explicit position fix)
                enemies.push({
                    x: doorX - 350, y: groundY - 64 - 3, w: 56, h: 64,
                    vx: -1.0, vy: 0, onGround: false,
                    hp: 15, maxHp: 15, stompDropsHp: 5, isBig: true, hoverAboveGround: true, dead: false,
                    patrolX0: doorX - 600, patrolX1: doorX - 150,
                    dir: 1, walkAnim: 0, waitingForItems: true
                });
                // Boss 2: Bat
                enemies.push({
                    x: doorX - 220, y: H - 320, baseY: H - 320, w: 48, h: 40,
                    vx: 0, vy: 0, onGround: false, isBat: true, isBig: true, hitAndRun: true,
                    aiState: 'retreat', aiTimer: 60,
                    hp: 18, maxHp: 18, stompDropsHp: 5, dead: false,
                    patrolX0: doorX - 500, patrolX1: doorX - 100,
                    dir: 1, walkAnim: 0, waitingForItems: true,
                    shootCooldown: 360
                });
                // Boss 3: Person
                enemies.push({
                    x: doorX - 100, y: groundY - 72, w: 44, h: 72,
                    vx: 1.2, vy: 0, onGround: false,
                    isPerson: true, isBig: true, shootCooldown: 60,
                    hp: 20, maxHp: 20, dead: false,
                    patrolX0: doorX - 400, patrolX1: doorX,
