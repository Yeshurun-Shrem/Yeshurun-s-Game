                    ghostMode: true, baseY: groundY - 72
                });
            }

            return { worldW, platforms, spikes, coins: coinsArr, gems, hearts: heartsArr, enemies, door, groundY, guns };
        }

        let globalHasGun = true;

        // ─── Player ───────────────────────────────────────────────────────────────────
        function makePlayer() {
            return {
                x: 80, y: 300, w: 22, h: 51,
                vx: 0, vy: 0,
                onGround: false, jumpsLeft: 2,
                hp: 5, maxHp: 5,
                invincible: 0, // frames of invincibility
                dir: 1, // 1=right -1=left
                hasGun: globalHasGun, gunCooldown: 0,
                walkAnim: 0,
                dead: false,
                coyoteTime: 0,
                jumpBuffered: false,
                enteringDoor: false,
                doorTargetX: 0,
                doorOpenProgress: 0,
                alpha: 1,
                lastOnGroundX: 80,
                lastOnGroundY: 300
            };
        }

        // ─── AABB collision ───────────────────────────────────────────────────────────
        function isOverlap(a, b) {
            return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
        }

        function resolveVsplatforms(entity, platforms) {
            entity.onGround = false;
            for (const p of platforms) {
                if (p.bricks) {
                    for (const b of p.bricks) {
                        if (b.gone) continue;
                        const bBox = { x: b.x, y: p.y, w: b.w, h: p.h };
                        if (!isOverlap(entity, bBox)) continue;
                        const dx = (entity.x + entity.w / 2) - (bBox.x + bBox.w / 2);
                        const dy = (entity.y + entity.h / 2) - (bBox.y + bBox.h / 2);
                        const ex = entity.w / 2 + bBox.w / 2 - Math.abs(dx);
                        const ey = entity.h / 2 + bBox.h / 2 - Math.abs(dy);
                        if (ex < ey) {
                            entity.x += dx > 0 ? ex : -ex;
                            entity.vx = 0;
                        } else {
                            entity.y += dy > 0 ? ey : -ey;
                            if (dy < 0) { 
                                entity.vy = 0; 
                                entity.onGround = true; 
                                if (entity === player && b.timer === null) {
                                    b.timer = 19; // 0.32 seconds @ 60 FPS
                                }
                            }
                            else { entity.vy = 0; }
                        }
                    }
                } else {
                    if (!isOverlap(entity, p)) continue;
                    const dx = (entity.x + entity.w / 2) - (p.x + p.w / 2);
                    const dy = (entity.y + entity.h / 2) - (p.y + p.h / 2);
                    const ex = entity.w / 2 + p.w / 2 - Math.abs(dx);
                    const ey = entity.h / 2 + p.h / 2 - Math.abs(dy);
                    if (ex < ey) {
                        entity.x += dx > 0 ? ex : -ex;
                        entity.vx = 0;
                    } else {
                        entity.y += dy > 0 ? ey : -ey;
                        if (dy < 0) { entity.vy = 0; entity.onGround = true; }
                        else { entity.vy = 0; }
                    }
                }
            }
        }

        // ─── Draw helpers ─────────────────────────────────────────────────────────────
        function drawStarsBg(t) {
            ctx.save();
            // Two-tone sky gradient
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, PAL.sky1);
            grad.addColorStop(1, PAL.sky2);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
            // Stars
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            for (let i = 0; i < 80; i++) {
                const sx = (Math.sin(i * 1234.5) * 0.5 + 0.5) * W;
                const sy = (Math.sin(i * 6789.1) * 0.5 + 0.5) * H * 0.65;
                const ss = Math.sin(t * 0.001 + i) * 0.4 + 0.7;
                ctx.globalAlpha = ss * 0.7;
                ctx.fillRect(sx | 0, sy | 0, ss < 0.5 ? 1 : 2, ss < 0.5 ? 1 : 2);
            }
            ctx.globalAlpha = 1;
            // Moon
            ctx.beginPath();
            ctx.arc(W - 90, 70, 36, 0, Math.PI * 2);
            const moonGrad = ctx.createRadialGradient(W - 90, 70, 5, W - 90, 70, 36);
            moonGrad.addColorStop(0, '#fffde7');
            moonGrad.addColorStop(1, '#ffe082');
            ctx.fillStyle = moonGrad;
            ctx.fill();
            ctx.restore();
        }

        function drawPlatform(p, cam) {
            const x = p.x - cam, y = p.y;
            if (p.moving) {
                // Moving block (Strictly unique style and 3rd color)
                ctx.fillStyle = PAL.moving;
                ctx.fillRect(x, y, p.w, p.h);
                ctx.fillStyle = PAL.movingShadow;
                for (let bx = x; bx < x + p.w; bx += 10) {
                    ctx.fillRect(bx, y, 1, p.h);
                }
                ctx.fillStyle = 'rgba(255,255,255,0.18)';
                ctx.fillRect(x, y, p.w, 3);
            } else if (p.type === 'sand') {
                // Sand block
                ctx.fillStyle = PAL.sandDark;
                ctx.fillRect(x, y, p.w, p.h);
                ctx.fillStyle = PAL.sandLight;
                ctx.fillRect(x, y, p.w, Math.min(8, p.h * 0.5));
                // Texture lines
                ctx.fillStyle = 'rgba(0,0,0,0.08)';
                for (let bx = x; bx < x + p.w; bx += 16) {
                    ctx.fillRect(bx, y, 1, p.h);
                }
            } else if (p.bricks) {
                // Crumbling Bricks (Static stone platforms)
                for (const b of p.bricks) {
                    if (b.gone) continue;
                    const bx = b.x - cam;
                    ctx.fillStyle = PAL.stone;
                    ctx.fillRect(bx, y, b.w, p.h);
                    
                    // Vertical separation shadow
                    ctx.fillStyle = PAL.stoneShadow;
                    ctx.fillRect(bx, y, 1, p.h);
                    
                    // If about to crumble, flash red/grey highlight!
                    if (b.timer !== null && b.timer > 0) {
                        ctx.fillStyle = `rgba(255, 68, 68, ${0.15 + 0.15 * Math.sin(b.timer * 0.8)})`;
                        ctx.fillRect(bx, y, b.w, p.h);
                    }
                    
                    // Top highlight
                    ctx.fillStyle = 'rgba(255,255,255,0.09)';
                    ctx.fillRect(bx, y, b.w, 3);
                }
            } else {
                // Stone block fallback
                ctx.fillStyle = PAL.stone;
                ctx.fillRect(x, y, p.w, p.h);
                ctx.fillStyle = PAL.stoneShadow;
                for (let bx = x; bx < x + p.w; bx += 12) {
                    ctx.fillRect(bx, y, 1, p.h);
                }
                ctx.fillStyle = 'rgba(255,255,255,0.09)';
                ctx.fillRect(x, y, p.w, 3);
            }
        }

        function drawPlayer(pl, cam, t) {
            if (pl.invincible > 0 && Math.floor(t / 4) % 2 === 0) return;
            const x = Math.round(pl.x - cam), y = Math.round(pl.y);
            const d = 1; // Draw all assets facing right; left-facing is handled via mirror transformation
            ctx.save();

            // Horizontal mirroring around center
            if (pl.dir < 0) {
                ctx.translate(x + pl.w / 2, y + pl.h);
                ctx.scale(-1, 1);
                ctx.translate(-(x + pl.w / 2), -(y + pl.h));
            }

            if (pl.isCrouching) {
                const px = x + pl.w / 2;
                const py = y + pl.h / 2;
                ctx.translate(0, 15); // Shift down to lay flat on the ground
                ctx.translate(px, py);
                ctx.rotate(Math.PI / 2 * d);
                ctx.translate(-px, -py);
            }

            const pX = (px, py, pw, ph, color) => {
                ctx.fillStyle = color;
                ctx.fillRect(x + (d > 0 ? px : pl.w - px - pw), y + py, pw, ph);
            };

            const legOff = pl.onGround ? Math.sin(pl.walkAnim) * 5 : 0;
            const khaki = '#7d7547', khakiL = '#9a9266', khakiD = '#5e5833';
            const skin = '#f0b884', skinD = '#d49b6a';
            const brown = '#3b2c1e', black = '#242424';

            // Legs offsets when jumping
            let backLegXOff = 0;
            let backLegYOff = 0;
            let frontLegXOff = 0;
            let frontLegYOff = 0;
            if (!pl.onGround && !pl.isCrouching) {
                backLegXOff = -3;
                backLegYOff = -3;
                frontLegXOff = 4;
                frontLegYOff = -2;
            }

            // 1. Legs (Baggy & Realistic)
            // Back leg (slightly offset for depth)
            pX(4 + backLegXOff, 42 + (legOff > 0 ? 0 : -legOff) + backLegYOff, 7, 12, khakiD);
            pX(3 + backLegXOff, 54 + (legOff > 0 ? 0 : -legOff) + backLegYOff, 9, 4, brown);
            // Front leg
            pX(9 + frontLegXOff, 42 + (legOff > 0 ? legOff : 0) + frontLegYOff, 8, 12, khaki);
            pX(9 + frontLegXOff, 46 + (legOff > 0 ? legOff : 0) + frontLegYOff, 8, 3, khakiL); 
            pX(8 + frontLegXOff, 54 + (legOff > 0 ? legOff : 0) + frontLegYOff, 10, 4, brown);

            // 2. Torso / Vest (Elongated & Curved)
            // We use a slight "S" curve posture
            pX(4, 22, 13, 22, khaki); // Taller, narrower base
            pX(5, 23, 11, 16, khakiD); // Main vest body
            // Lower back / Waist curve (forward shift)
            pX(6, 34, 12, 6, khaki); 
            // Pockets (refined placement)
            pX(6, 25, 4, 4, khaki); pX(11, 25, 4, 4, khaki);
            pX(6, 30, 4, 4, khaki); pX(11, 30, 4, 4, khaki);
            // Belt area
            pX(5, 39, 13, 3, khakiD);

            // 3. Shoulder Patch (Perfectly mirrored)
            pX(d > 0 ? 5 : 13, 24, 4, 6, '#fff'); 
            pX(d > 0 ? 6 : 14, 26, 2, 2, '#333');

            // 4. Head & Helmet (Shifted slightly higher when crouching)
            ctx.save();
            if (pl.isCrouching) {
                ctx.translate(-4 * d, 0); // Raise head slightly (towards the back) when lying flat
            }
            // Face profile (Oval)
            const fX = x + (d > 0 ? 8 : pl.w - 8 - 10), fY = y + 8;
            ctx.fillStyle = skin;
            ctx.beginPath(); ctx.roundRect(fX, fY, 10, 11, 4); ctx.fill();
            pX(15, 14, 3, 2, skin); // Nose
            pX(8, 10, 8, 3, '#5c3d2e'); // Hair peeking
            // Eye (Perfectly mirrored)
            pX(d > 0 ? 13 : 7, 13, 2, 2, black);
            // Smile
            pX(12, 18, 4, 1, skinD);
            pX(15, 17, 1, 1, skinD);

            // 5. Helmet (Round top, flat bottom, significantly tilted - Perfectly mirrored)
            const hX = x + (d > 0 ? 4 : pl.w - 4 - 16), hY = y + 2;
            ctx.save();
            ctx.translate(hX + 7, hY + 11);
            ctx.rotate(-0.25 * d); // Reversed tilt direction
            ctx.translate(-(hX + 7), -(hY + 11));
            ctx.fillStyle = khakiD;
            ctx.beginPath(); ctx.roundRect(hX, hY, 16, 11, [9, 9, 0, 0]); ctx.fill();
            ctx.fillStyle = khaki;
            ctx.beginPath(); ctx.roundRect(hX + 1, hY + 1, 14, 8, [8, 8, 0, 0]); ctx.fill();
            ctx.fillStyle = khakiL;
            ctx.fillRect(hX + 4, hY + 2, 6, 2); 
            ctx.restore();
            // Strap
            pX(d > 0 ? 14 : 7, 10, 1, 5, black);
            ctx.restore();

            // 6. Arms & Weapon
            if (pl.hasGun) {
                ctx.save();
                let weaponX = d > 0 ? pl.w - 4 : 4;
                let weaponY = pl.isCrouching ? 13 : 30;
                if (pl.enteringDoor) weaponY -= 6;
                if (pl.isCrouching) {
                    weaponX = d > 0 ? pl.w - 11 : 11; // Shift gun higher (towards the back) relative to the lying body
                }
                ctx.translate(x + weaponX, y + weaponY);
                const shootAnim = pl.gunCooldown > 0;
                let gunRot = shootAnim ? 0 : (pl.isCrouching ? -0.1 * d : 0.4 * d);
                if (pl.isCrouching) gunRot = -Math.PI / 2 * d; // Counter-rotate to remain horizontal relative to the screen
                if (pl.enteringDoor) gunRot = (Math.PI / 2.2) * d;
                ctx.rotate(gunRot);
                // M16 Rifle
                ctx.fillStyle = black;
                ctx.fillRect(d > 0 ? 0 : -32, -2, 32, 4); // Barrel
                if (shootAnim) {
                    ctx.fillStyle = '#ffffaa'; // Muzzle flash
                    ctx.fillRect(d > 0 ? 32 : -36, -3, 4, 6);
                }
                ctx.fillStyle = black;
                ctx.fillRect(d > 0 ? 2 : -10, -5, 14, 3); // Top rail
                ctx.fillRect(d > 0 ? 8 : -14, 2, 4, 8); // Magazine
                ctx.fillRect(d > 0 ? -6 : 0, -3, 8, 8); // Stock
                // Shading on rifle
                ctx.fillStyle = '#444';
                ctx.fillRect(d > 0 ? 2 : -30, -1, 28, 1);
                // Hands (Gloves) - Draw inside rotated context if entering door
                if (pl.enteringDoor) {
                    ctx.fillStyle = brown;
                    if (d > 0) {
                        ctx.fillRect(4, -3, 6, 6);
                        ctx.fillRect(12, -3, 6, 6);
                    } else {
                        ctx.fillRect(-10, -3, 6, 6);
                        ctx.fillRect(-18, -3, 6, 6);
                    }
                }
                ctx.restore();
                
                if (!pl.enteringDoor) {
                    const handY = pl.isCrouching ? (shootAnim ? 13 : 16) : (shootAnim ? 30 : 33);
                    pX(16, handY, 7, 6, brown);
                    pX(6, handY, 6, 6, brown);
                }
            }

            ctx.restore();
        }

        function drawEnemy(en, cam, t) {
            if (en.dead || en.waitingForItems) return;
            const x = en.x - cam, y = en.y;
            ctx.save();

            if (en.isBat) {
                const isGiant = en.isBig;
                const stunned = en.stunTimer > 0;

                // Bat shadow
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.beginPath();
                ctx.ellipse(x + en.w / 2, y + en.h + (isGiant ? 45 : 30), en.w * 0.3, en.w * 0.1, 0, 0, Math.PI * 2);
                ctx.fill();

                // Bat body
                ctx.fillStyle = stunned ? '#555' : '#222';
                ctx.beginPath();
                ctx.ellipse(x + en.w / 2, y + en.h / 2, en.w / 2, en.h / 2, 0, 0, Math.PI * 2);
                ctx.fill();

                // Wings
                const flapMult = isGiant ? 16 : 8;
                const wingFlap = Math.sin(en.walkAnim * 4) * flapMult;
                ctx.fillStyle = stunned ? '#333' : '#111';

                ctx.beginPath();
                ctx.moveTo(x + en.w / 2, y + en.h * 0.2);
                ctx.quadraticCurveTo(x - en.w * 0.4, y - wingFlap, x - en.w * 0.6, y + en.h * 0.4 - wingFlap);
                ctx.lineTo(x + en.w * 0.2, y + en.h * 0.6);
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(x + en.w / 2, y + en.h * 0.2);
                ctx.quadraticCurveTo(x + en.w * 1.4, y - wingFlap, x + en.w * 1.6, y + en.h * 0.4 - wingFlap);
                ctx.lineTo(x + en.w * 0.8, y + en.h * 0.6);
                ctx.fill();

                // Red eyes
                ctx.fillStyle = '#f00';
                const eyeW = isGiant ? 6 : 3;
                const eyeH = isGiant ? 6 : 3;
                const eyeY = y + en.h * 0.3;
                const dirOff = (en.dir > 0 ? (isGiant ? 4 : 2) : 0);

                ctx.fillRect(x + en.w * 0.25 + dirOff, eyeY, eyeW, eyeH);
                ctx.fillRect(x + en.w * 0.5 + dirOff, eyeY, eyeW, eyeH);
            } else {
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.beginPath();
                ctx.ellipse(x + en.w / 2, y + en.h + 2, 12, 3, 0, 0, Math.PI * 2);
                ctx.fill();

                if (en.isPerson) {
                    const isB = en.isBig;
                    const legAnim = Math.sin(en.walkAnim) * (isB ? 10 : 5);
                    
                    // Colors
                    const chimpBrown = '#5d4037'; // Dark brown
                    const chimpLight = '#d7ccc8'; // Light beige for snout/belly
                    const bananaYellow = '#ffd54f'; // Vibrant yellow
                    const sunglassesBlack = '#212121'; // Sleek dark grey/black
                    
                    // 1. Legs (Brown hairy legs)
                    ctx.fillStyle = chimpBrown;
                    ctx.fillRect(x + en.w * 0.1, y + en.h - (isB ? 24 : 12), en.w * 0.32, (isB ? 24 : 12) + legAnim);
                    ctx.fillRect(x + en.w * 0.58, y + en.h - (isB ? 24 : 12), en.w * 0.32, (isB ? 24 : 12) - legAnim);
                    
                    // Feet (peach paws)
                    ctx.fillStyle = chimpLight;
                    ctx.fillRect(x + en.w * 0.05 + (en.dir < 0 ? -2 : 0), y + en.h - 2 + legAnim, en.w * 0.4, 3);
                    ctx.fillRect(x + en.w * 0.55 + (en.dir < 0 ? -2 : 0), y + en.h - 2 - legAnim, en.w * 0.4, 3);
                    
                    // 2. Torso (Brown chimp body)
                    ctx.fillStyle = chimpBrown;
                    ctx.beginPath();
                    ctx.roundRect(x + en.w * 0.05, y + en.h * 0.3, en.w * 0.9, en.h * 0.45, isB ? 12 : 6);
                    ctx.fill();
                    
                    // Beige Belly Patch
                    ctx.fillStyle = chimpLight;
                    ctx.beginPath();
                    ctx.roundRect(x + en.w * 0.2, y + en.h * 0.38, en.w * 0.6, en.h * 0.3, isB ? 8 : 4);
                    ctx.fill();
                    
                    // 3. Ears (Protruding round chimp ears!)
                    ctx.fillStyle = chimpBrown;
                    ctx.beginPath();
                    ctx.arc(x + en.w * 0.15, y + en.h * 0.15, isB ? 8 : 4, 0, Math.PI * 2);
                    ctx.arc(x + en.w * 0.85, y + en.h * 0.15, isB ? 8 : 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = chimpLight;
                    ctx.beginPath();
                    ctx.arc(x + en.w * 0.15, y + en.h * 0.15, isB ? 4 : 2, 0, Math.PI * 2);
                    ctx.arc(x + en.w * 0.85, y + en.h * 0.15, isB ? 4 : 2, 0, Math.PI * 2);
                    ctx.fill();

                    // 4. Head
                    ctx.fillStyle = chimpBrown;
                    ctx.beginPath();
                    ctx.roundRect(x + en.w * 0.18, y + en.h * 0.02, en.w * 0.64, en.h * 0.28, isB ? 10 : 5);
                    ctx.fill();
                    
                    // Snout / Mouth area (Light)
                    ctx.fillStyle = chimpLight;
                    ctx.beginPath();
                    ctx.roundRect(x + en.w * 0.24, y + en.h * 0.16, en.w * 0.52, en.h * 0.14, isB ? 6 : 3);
                    ctx.fill();
                    
                    // Smiling mouth line
                    ctx.strokeStyle = '#8d6e63';
                    ctx.lineWidth = isB ? 2 : 1;
                    ctx.beginPath();
                    ctx.arc(x + en.w * 0.5, y + en.h * 0.2, isB ? 6 : 3, 0, Math.PI);
                    ctx.stroke();

                    // 5. Cool Sunglasses! (Sleek black rectangular glasses with white glare)
                    ctx.fillStyle = sunglassesBlack;
                    const glassW = en.w * 0.24;
                    const glassH = en.h * 0.08;
                    const glassY = y + en.h * 0.08;
                    ctx.fillRect(x + en.w * 0.22, glassY, glassW, glassH);
                    ctx.fillRect(x + en.w * 0.54, glassY, glassW, glassH);
                    ctx.fillRect(x + en.w * 0.44, glassY + 2, en.w * 0.12, isB ? 3 : 1.5);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(x + en.w * 0.24, glassY + 1, isB ? 3 : 1.5, isB ? 3 : 1.5);
                    ctx.fillRect(x + en.w * 0.56, glassY + 1, isB ? 3 : 1.5, isB ? 3 : 1.5);

                    // 6. Right arm extending forward to aim and hold the banana-rifle (always visible)
                    ctx.save();
                    const bnx = x + (en.dir > 0 ? en.w * 0.55 : en.w * 0.45);
                    const bny = y + (isB ? en.h * 0.54 : en.h * 0.44);
                    ctx.translate(bnx, bny);
                    
                    // Scale based on direction: mirrors horizontally without flipping the vertical curve upside down!
                    ctx.scale(en.dir > 0 ? 1 : -1, 1);
                    
                    // Brown sleeve/arm extending forward to hold the stock
                    ctx.strokeStyle = chimpBrown;
                    ctx.lineWidth = isB ? 8 : 5;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(-(isB ? 12 : 7), -(isB ? 4 : 2)); // shoulder
                    ctx.lineTo(0, 0); // hand
                    ctx.stroke();
                    
                    // Peach right hand paw holding the banana!
                    ctx.fillStyle = chimpLight;
                    ctx.beginPath();
                    ctx.arc(0, 0, isB ? 4 : 2, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Curved yellow banana body (Starts low at hand, curves up and aims horizontally forward!)
                    ctx.strokeStyle = bananaYellow;
                    ctx.lineWidth = isB ? 8 : 5;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(-(isB ? 6 : 3), isB ? 5 : 3); // starts lower
                    ctx.quadraticCurveTo(0, -(isB ? 3 : 1.5), isB ? 24 : 14, 0); // aims forward
                    ctx.stroke();
                    
                    // Brown handle stalk (lower rear end)
                    ctx.strokeStyle = '#5d4037';
                    ctx.lineWidth = isB ? 5 : 3;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(-(isB ? 6 : 3), isB ? 5 : 3);
                    ctx.lineTo(-(isB ? 9 : 5), isB ? 8 : 5);
                    ctx.stroke();
                    
                    // Black/brown tip (barrel muzzle pointing straight forward)
                    ctx.fillStyle = '#5d4037';
                    ctx.beginPath();
                    ctx.arc(isB ? 24 : 14, 0, isB ? 3 : 1.5, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.restore();
                } else {
                    const stunned = en.stunTimer > 0;
                    const eg = ctx.createLinearGradient(x, y, x, y + en.h);
                    eg.addColorStop(0, stunned ? '#eeaa00' : PAL.enemy1);
                    eg.addColorStop(1, stunned ? '#aa7700' : PAL.enemy2);
                    ctx.fillStyle = eg;
                    ctx.beginPath();
                    ctx.roundRect(x, y + 12, en.w, en.h - 12, 4);
                    ctx.fill();

                    // Head
                    ctx.fillStyle = stunned ? '#ffcc44' : '#ff6677';
                    ctx.beginPath();
                    ctx.roundRect(x + 2, y, en.w - 4, 16, 5);
                    ctx.fill();

                    // Eyes
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(x + 5, y + 4, 5, 5);
                    ctx.fillRect(x + en.w - 10, y + 4, 5, 5);
                    ctx.fillStyle = '#111';
                    ctx.fillRect(x + 6 + (en.dir > 0 ? 1 : 0), y + 5, 3, 3);
                    ctx.fillRect(x + en.w - 9 + (en.dir > 0 ? 1 : 0), y + 5, 3, 3);

                    // Horns
                    ctx.fillStyle = '#882200';
                    ctx.fillRect(x + 4, y - 5, 4, 8);
                    ctx.fillRect(x + en.w - 8, y - 5, 4, 8);
                }
            }

            // HP bar
            if (en.hp < en.maxHp) {
                ctx.fillStyle = '#ff4444';
                ctx.fillRect(x, y - 10, en.w, 4);
                ctx.fillStyle = '#44ff44';
                ctx.fillRect(x, y - 10, en.w * (en.hp / en.maxHp), 4);
            }

            ctx.restore();
        }

                function drawCoin(c, cam, t) {
            if (c.collected) return;
            const x = c.x - cam, y = c.y + Math.sin(t * 0.06 + (c.bob || 0)) * 4;
            ctx.save();
            ctx.fillStyle = PAL.gem;
            ctx.beginPath();
            ctx.moveTo(x, y - 12);
            ctx.lineTo(x + 8, y - 2);
            ctx.lineTo(x, y + 12);
            ctx.lineTo(x - 8, y - 2);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.moveTo(x, y - 12);
            ctx.lineTo(x + 4, y - 2);
            ctx.lineTo(x, y - 4);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        function drawGem(g, cam, t) {
            if (g.collected) return;
            const x = g.x - cam, y = g.y + Math.sin(t * 0.06 + g.bob) * 4;
            ctx.save();
            ctx.fillStyle = PAL.gem;
            // Diamond shape
            ctx.beginPath();
            ctx.moveTo(x, y - 12);
            ctx.lineTo(x + 8, y - 2);
            ctx.lineTo(x, y + 12);
            ctx.lineTo(x - 8, y - 2);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.moveTo(x, y - 12);
            ctx.lineTo(x + 4, y - 2);
            ctx.lineTo(x, y - 4);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        function drawHeart(h, cam, t) {
            if (h.collected) return;
            const x = h.x - cam, y = h.y + Math.sin(t * 0.07) * 4;
            ctx.save();
            ctx.fillStyle = '#ff4466';
            ctx.beginPath();
            // Simple heart shape
            ctx.moveTo(x, y + 4);
            ctx.bezierCurveTo(x, y, x - 8, y, x - 8, y - 6);
            ctx.bezierCurveTo(x - 8, y - 12, x, y - 12, x, y - 6);
            ctx.bezierCurveTo(x, y - 12, x + 8, y - 12, x + 8, y - 6);
            ctx.bezierCurveTo(x + 8, y, x, y, x, y + 4);
            ctx.fill();
            ctx.restore();
        }

        function drawSpike(s, cam) {
            if (s.dead) return;
            const x = s.x - cam, y = s.y;
            ctx.save();
            ctx.fillStyle = PAL.spike;
            ctx.beginPath();
            ctx.moveTo(x, y + 10);
            ctx.lineTo(x + 8, y + 10);
            ctx.lineTo(x + 4, y);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        function drawDoor(door, cam, pl) {
            const x = door.x - cam, y = door.y;
            const openProg = (pl && pl.enteringDoor) ? Math.min(1, pl.doorOpenProgress || 0) : 0;
            const doorW = door.w * (1 - openProg);

            ctx.save();
            // Frame (with top border)
            ctx.fillStyle = '#553300';
            ctx.fillRect(x - 4, y - 4, door.w + 8, door.h + 4);
            
            // Inside void
            ctx.fillStyle = '#000000';
            ctx.fillRect(x, y, door.w, door.h);
            
            if (doorW > 0) {
                // Door body
                ctx.fillStyle = door.open ? '#ffd700' : '#aa8800';
                ctx.fillRect(x, y, doorW, door.h);
                // Panel detail
                ctx.fillStyle = 'rgba(0,0,0,0.18)';
                ctx.fillRect(x + 4, y + 6, Math.max(0, doorW - 8), door.h / 2 - 8);
                ctx.fillRect(x + 4, y + door.h / 2 + 2, Math.max(0, doorW - 8), door.h / 2 - 8);
                // Knob
                if (doorW > door.w - 10) {
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(x + doorW - 7, y + door.h / 2, 4, 0, Math.PI * 2);
                    ctx.fill();
                    if (door.open) {
                        ctx.fillStyle = '#00ff88';
                        ctx.fill();
                    }
                }
            }

            // Star glow (only before opening)
            if (door.open && openProg === 0) {
                ctx.globalAlpha = 0.3 + Math.sin(Date.now() * 0.005) * 0.2;
                ctx.fillStyle = '#ffffc0';
                ctx.fillRect(x - 5, y - 5, door.w + 10, door.h + 10);
            }
            ctx.restore();
        }

        // Background parallax layers
        function drawBg(cam, t) {
            // Mountains (far)
            ctx.fillStyle = PAL.mountain;
            for (let i = 0; i < 8; i++) {
                const mx = ((i * 320 - cam * 0.15) % (W + 200)) - 50;
                const mh = 80 + Math.sin(i * 1.3) * 40;
                ctx.beginPath();
                ctx.moveTo(mx, H - 40);
                ctx.lineTo(mx + 120, H - 40 - mh);
                ctx.lineTo(mx + 240, H - 40);
                ctx.fill();
            }
            // Dunes (mid)
            ctx.fillStyle = PAL.dune;
            for (let i = 0; i < 10; i++) {
                const mx = ((i * 200 - cam * 0.3) % (W + 160)) - 30;
                const mh = 35 + Math.sin(i * 2.1) * 15;
                ctx.beginPath();
                ctx.moveTo(mx - 20, H - 38);
                ctx.quadraticCurveTo(mx + 80, H - 38 - mh, mx + 180, H - 38);
                ctx.fill();
            }
        }

        // ─── HUD update ───────────────────────────────────────────────────────────────
        function updateHUD(pl) {
            let hearts = '';
            for (let i = 0; i < pl.maxHp; i++) hearts += i < pl.hp ? '❤️' : '🖤';
            document.getElementById('hearts').textContent = hearts;

            document.getElementById('levelCount').textContent = level;
            document.getElementById('enemiesCount').textContent = enemiesKilled;
        }

        // ─── Main Game Loop Variables ─────────────────────────────────────────────────
        let ld = null; // level data
        let player = null;
        let t = 0; // frame counter

        function initLevel(startHP = 5) {
            setLevelPalette(level);
            ld = makeLevelData(level);
            player = makePlayer();
            if (startHP !== 5) player.hp = startHP;
            // Reset level variables
            cam = 0;
            particles = [];
            floatingTexts = [];
            bullets = [];
        }

        // ─── Update ───────────────────────────────────────────────────────────────────
        function update() {
            const pl = player;
            const { platforms, spikes, coins: coinsArr, gems, hearts, enemies, door, worldW } = ld;

            if (state === 'playing') {
                t++;

                // ── Moving platforms & Crumbling bricks ──
                for (const p of platforms) {
                    if (p.moving) {
                        p.x += p.mspd;
                        if (p.x > p.mx1 || p.x < p.mx0) { p.mspd *= -1; p.x += p.mspd; }
                    } else if (p.bricks) {
                        for (const b of p.bricks) {
                            if (b.timer !== null && b.timer > 0) {
                                b.timer--;
                                if (b.timer === 0) {
                                    b.gone = true;
                                    spawnParticles(b.x + b.w / 2, p.y + p.h / 2, PAL.stoneShadow, 4);
                                    SND.hit(); // play crumbling sound
                                }
                            }
                        }
                    }
                }

                // ── Player input ──
                const speed = 3.0;
                const jumpForce = -10.5;

                let isLeft = keys['ArrowLeft'] || keys['KeyA'];
                let isRight = keys['ArrowRight'] || keys['KeyD'];
                let isJump = keys['ArrowUp'] || keys['KeyW'];
                let isAtk = keys['KeyZ'];
                let isShoot = keys['KeyX'] || keys['Space'];
                let isCrouch = keys['ArrowDown'] || keys['KeyS'];

                if (pl.enteringDoor) {
                    isLeft = false;
                    isRight = false;
                    isJump = false;
                    isShoot = false;
                    isCrouch = false;
                    
                    if (pl.doorOpenProgress < 1) {
                        pl.doorOpenProgress += 0.05; // Door slides open
                        pl.vx = 0;
                        pl.walkAnim = 0;
                    } else if (Math.abs(pl.x - pl.doorTargetX) > 2) {
                        pl.vx = pl.x < pl.doorTargetX ? speed * 0.5 : -speed * 0.5;
                        pl.dir = pl.x < pl.doorTargetX ? 1 : -1;
                        pl.walkAnim += 0.15;
                    } else if (pl.doorOpenProgress < 1.5) {
                        pl.doorOpenProgress += 0.05;
                        pl.vx = 0;
                        pl.y -= 1.2;
                        pl.walkAnim += 0.15;
                    } else {
                        pl.vx = 0;
                        pl.walkAnim = 0;
                        pl.alpha -= 0.05;
                        if (pl.alpha <= -1.1) { // Wait an extra 0.2 seconds (12 frames at 0.05 decrement) after fully disappearing (-0.5)
                            state = 'win'; 
                            spawnParticles(pl.x + pl.w / 2, pl.y, '#ffd700', 20); 
                            SND.win(level === MAX_LEVELS);
                            if (level === MAX_LEVELS) SND.stopMusic();
                            else SND.pauseMusic();
                        }
                    }
                }
                
                // Crouching logic
                const crouchH = 21, standH = 51;
                if (isCrouch) {
                    if (!pl.isCrouching) {
                        pl.isCrouching = true;
                        pl.y += (standH - crouchH);
                        pl.h = crouchH;
                    }
                } else if (pl.isCrouching) {
                    let canStand = !isCrouch; 
                    if (canStand) {
                        const headRect = { x: pl.x, y: pl.y - (standH - crouchH), w: pl.w, h: standH - crouchH };
                        for (const p of platforms) if (isOverlap(headRect, p)) { canStand = false; break; }
                    }
                    if (canStand) {
                        pl.isCrouching = false;
                        pl.y -= (standH - crouchH);
                        pl.h = standH;
                    }
                }

                if (isLeft) { pl.vx = pl.isCrouching ? -speed * 0.4 : -speed; pl.dir = -1; }
                else if (isRight) { pl.vx = pl.isCrouching ? speed * 0.4 : speed; pl.dir = 1; }
                else pl.vx = lerp(pl.vx, 0, 0.3);

                if (pl.onGround) { pl.coyoteTime = 8; pl.jumpsLeft = 2; }
                else if (pl.coyoteTime > 0) pl.coyoteTime--;

                if (isJump && !pl._jumpHeld) {
                    if (pl.coyoteTime > 0 || pl.jumpsLeft > 0) {
                        pl.vy = jumpForce;
                        if (pl.coyoteTime <= 0) pl.jumpsLeft--;
                        pl.coyoteTime = 0;
                        pl._jumpHeld = true;
                    }
                }
                if (!isJump) pl._jumpHeld = false;
                if (!isJump && pl.vy < -4) pl.vy += 0.7;

                if (pl.gunCooldown > 0) pl.gunCooldown--;
                if (isShoot && pl.hasGun && pl.gunCooldown <= 0) {
                    pl.gunCooldown = 15;
                    const bY = pl.isCrouching ? pl.y + 10 : pl.y + 31;
                    const bX = pl.isCrouching 
                        ? pl.x + (pl.dir > 0 ? pl.w + 34 : -34) 
                        : pl.x + (pl.dir > 0 ? pl.w + 28 : -36);
                    bullets.push({ x: bX, y: bY, vx: pl.dir * 8, w: 8, h: 4, life: 60 });
                    spawnParticles(bX, bY, '#ffffaa', 4);
                    SND.shoot();
                }

                if (pl.enteringDoor) {
                    pl.vy = 0;
                } else {
                    pl.vy = Math.min(pl.vy + 0.55, 16);
                }
                pl.x += pl.vx;
                pl.y += pl.vy;
                pl.x = clamp(pl.x, 0, worldW - pl.w);
                if (!pl.enteringDoor) {
                    resolveVsplatforms(pl, platforms);
                }
                if (pl.onGround && !pl.enteringDoor) {
                    pl.lastOnGroundX = pl.x;
                    pl.lastOnGroundY = pl.y;
                }

                if (pl.onGround && Math.abs(pl.vx) > 0.3) pl.walkAnim += 0.25;
                if (pl.invincible > 0) pl.invincible--;

                updateCam(pl, worldW);

                for (const en of enemies) {
                    if (en.dead || en.waitingForItems) continue;
                    en.x += en.vx;
                    if (en.isBat) {
                        en.walkAnim += 0.1;
                        if (en.chasePlayer) {
                            const dx = pl.x - en.x, dy = pl.y - en.baseY;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 400) { en.vx = dx > 0 ? 1.0 : -1.0; en.baseY += dy > 0 ? 0.4 : -0.4; }
                            else en.vx = Math.sin(t * 0.02) * 0.5;
                        } else if (en.hitAndRun) {
                            if (en.aiTimer > 0) en.aiTimer--;
                            if (en.aiState === 'retreat') {
                                en.vx = (pl.x - en.x) > 0 ? -1.5 : 1.5;
                                en.baseY = lerp(en.baseY, H - 350, 0.05);
                                if (en.aiTimer <= 0) { en.aiState = 'attack'; en.aiTimer = 90; }
                            } else {
                                const dx = pl.x - en.x, dy = pl.y - en.baseY;
                                en.vx = dx > 0 ? 2.5 : -2.5; en.baseY += dy > 0 ? 1.5 : -1.5;
                                if (Math.abs(dx) < 60 && Math.abs(dy) < 60) { en.aiState = 'retreat'; en.aiTimer = 60; }
                            }
                        }
                        en.y = en.baseY + Math.sin(en.walkAnim) * 20;
                        en.dir = en.vx > 0 ? 1 : -1;
                        if (en.isBig) {
                            if (en.shootCooldown > 0) en.shootCooldown--;
                            else if (en.x > cam - 50 && en.x < cam + W + 50) {
                                spawnEnemyBullet(en, '#ff5500'); en.shootCooldown = 120;
                            }
                        }
                    } else {
                        if (en.ghostMode) en.y = en.baseY;
                        else if ((!en.isPerson && !en.isBat && !en.isBig) || en.hoverAboveGround) {
                            // Pink monsters and monster bosses hover/float 3px above the ground line.
                            en.vy = 0;
                            en.y = (H - 40) - en.h - 3;
                            en.onGround = true;
                        } else { 
                            en.vy = Math.min(en.vy + 0.55, 16); 
                            en.y += en.vy; 
                            const preVX = en.vx;
                            resolveVsplatforms(en, platforms); 
                            if (en.vx === 0 && Math.abs(preVX) > 0.1) en.vx = -preVX;
                        }

                        if ((en.isPerson || en.isBig) && en.onGround) {
                            const checkX = en.x + (en.vx > 0 ? en.w + 10 : -10), checkY = en.y + en.h + 5;
                            let hasGround = false;
                            for (const p of platforms) if (checkX > p.x && checkX < p.x + p.w && checkY > p.y && checkY < p.y + p.h + 30) { hasGround = true; break; }
                            if (!hasGround) { en.vx *= -1; en.x += en.vx * 2; }
                        }
                        en.dir = en.vx > 0 ? 1 : -1;
                        en.walkAnim = (en.walkAnim || 0) + 0.15;
                        if (!en.dead) {
                            if (en.isPerson || en.isBig) {
                                if (en.shootCooldown > 0) en.shootCooldown--;
                                else if (en.x > cam - 50 && en.x < cam + W + 50) {
                                    if (en.isPerson) {
                                        if (Math.abs(pl.y - en.y) < 180) {
                                            spawnEnemyBullet(en, '#ffaa44'); 
                                            en.shootCooldown = en.isBig ? 120 : 220;
                                        }
                                    } else if (en.isBig) { // Level 1 Boss
                                        spawnEnemyBullet(en, '#ff0000', null, null, true); 
                                        en.shootCooldown = 240;
                                    }
                                }
                            }
                        }
                    }
                    if (!en.chasePlayer && !en.hitAndRun) if (en.x < en.patrolX0 || en.x > en.patrolX1) en.vx *= -1;
                    en.x = clamp(en.x, 0, worldW - en.w);
                    if (en.stunTimer > 0) en.stunTimer--;

                    const enRect = { x: en.x - 2, y: en.y - 2, w: en.w + 4, h: en.h + 4 };
                    if (!en.dead && isOverlap(pl, enRect)) {
                        if (!pl.onGround && pl.vy > 0 && (pl.y + pl.h) < (en.y + en.h * 0.4) && (pl.x + pl.w * 0.3) < (en.x + en.w) && (pl.x + pl.w * 0.7) > en.x) {
                            en.hp -= en.isBig ? (en.stompDropsHp || 4) : en.hp;
                            if (en.hp <= 0) {
                                en.dead = true; enemiesKilled++; spawnParticles(en.x + en.w / 2, en.y, '#ff8800', 14);
                                if (!en.isBig) spawnFloatingText(en.x + en.w / 2, en.y, '+1');
                                if (en.isBig) SND.bossDie(); else SND.kill();
                            } else { en.stunTimer = 25; spawnParticles(en.x + en.w / 2, en.y, '#ff4455', 10); SND.hit(); }
                            pl.vy = -9; pl.jumpsLeft = 1;
                        } else if (pl.invincible === 0) {
                            pl.hp--; pl.invincible = 30; pl.vy = -7; pl.vx = pl.x > en.x ? 5 : -5;
                            spawnParticles(pl.x + pl.w / 2, pl.y, '#ff4455', 8);
                            SND.hit();
                            if (pl.hp <= 0) { pl.dead = true; state = 'dead'; }
                        }
                    }
                }

                for (const sk of spikes) if (!sk.dead && isOverlap(pl, { x: sk.x, y: sk.y, w: 8, h: 10 }) && pl.invincible === 0) {
                    pl.hp--; pl.invincible = 60; pl.vy = -9; spawnParticles(pl.x + pl.w / 2, pl.y, '#ff8844', 8); SND.hit();
                    if (pl.hp <= 0) { pl.dead = true; state = 'dead'; }
                }

                for (const c of coinsArr) if (!c.collected && isOverlap(pl, { x: c.x - 8, y: c.y - 8, w: 16, h: 16 })) {
                    c.collected = true; spawnParticles(c.x, c.y, '#ffe066', 5); spawnFloatingText(c.x, c.y - 10, '+1'); SND.coin();
                }
                for (const g of gems) if (!g.collected && isOverlap(pl, { x: g.x - 8, y: g.y - 12, w: 16, h: 24 })) {
                    g.collected = true; spawnParticles(g.x, g.y, '#00eeff', 10); spawnFloatingText(g.x, g.y - 10, '+1'); SND.coin();
                }
                for (const h of hearts) if (!h.collected && isOverlap(pl, { x: h.x - 8, y: h.y - 8, w: 16, h: 16 })) {
                    h.collected = true; if (pl.hp < pl.maxHp) pl.hp++; spawnParticles(h.x, h.y, '#ff4466', 10); spawnFloatingText(h.x, h.y - 10, '+1'); SND.heart();
                }
                if (ld.guns) for (const g of ld.guns) if (!g.collected && isOverlap(pl, g)) {
                    g.collected = true; pl.hasGun = true; globalHasGun = true; spawnParticles(g.x, g.y, '#ffd700', 15);
                    spawnFloatingText(g.x, g.y - 10, T('gunHint'), '#ffd700', 180);
                }

                const totalItemsRaw = (coinsArr.length + gems.length), collectedItemsRaw = (coinsArr.filter(c => c.collected).length + gems.filter(g => g.collected).length);
                for (const en of enemies) {
                    const spawnNeeded = (level === 1) ? 20 : (level === 2) ? 25 : (level === 3) ? 25 : (level === 4) ? 30 : (level === 5) ? 50 : Math.ceil(totalItemsRaw * 0.6);
                    if (en.waitingForItems && collectedItemsRaw >= spawnNeeded) {
                        en.waitingForItems = false; spawnParticles(en.x + en.w / 2, en.y + en.h / 2, '#ff4455', 25);
                        spawnFloatingText(en.x + en.w / 2, en.y - 40, T('bossAppeared'), '#ff4455', 180);
                        SND.bossAppeared();
                        if (level === 2 && !pl.hasGun) {
                            pl.hasGun = true; globalHasGun = true;
                            spawnFloatingText(pl.x, pl.y - 20, T('gunHint'), '#ffd700', 240);
                        }
                        }
                    }

                const bossDead = enemies.every(e => !e.isBig || e.dead), doorNeeded = (level === 1) ? 20 : (level === 2) ? 25 : (level === 3) ? 25 : (level === 4) ? 30 : (level === 5) ? 50 : Math.ceil(totalItemsRaw * 0.6);
                door.open = (collectedItemsRaw >= doorNeeded) && bossDead && (level !== 2 || pl.hasGun);

                if (isOverlap(pl, door)) {
                    if (door.open && state !== 'win' && !pl.enteringDoor && pl.onGround) { 
                        pl.enteringDoor = true;
                        pl.doorTargetX = door.x + door.w / 2 - pl.w / 2;
                    }
                    else if (!door.open && level === 2 && !pl.hasGun && t % 60 === 0) spawnFloatingText(door.x + 18, door.y - 30, T('collectGun'), '#ffcc00', 90);
                }

                if (pl.y > H + 60) {
                    pl.hp--; SND.fall(); if (pl.hp <= 0) state = 'dead';
                    else { 
                        // Respawn 20px before the pit (opposite to direction they were moving/facing)
                        const respawnX = pl.lastOnGroundX - 20 * pl.dir;
                        const respawnY = pl.lastOnGroundY - 10;
                        pl.x = clamp(respawnX, 0, worldW - pl.w);
                        pl.y = respawnY;
                        pl.vy = 0;
                        pl.vx = 0;
                        pl.invincible = 90;
                    }
                }
            }

            updateParticles();
            updateFloatingTexts();
            if (ld && ld.enemies) updateBullets(ld.enemies, player);
            updateHUD(player);
        }

        // ─── Draw ─────────────────────────────────────────────────────────────────────
        function draw() {
            // Background
            drawStarsBg(t);
            drawBg(cam, t);

            // World elements
            for (const p of ld.platforms) drawPlatform(p, cam);
            for (const sk of ld.spikes) drawSpike(sk, cam);
            for (const c of ld.coins) drawCoin(c, cam, t);
            for (const g of ld.gems) drawGem(g, cam, t);
            for (const h of ld.hearts) drawHeart(h, cam, t);
            if (ld.guns) {
                for (const g of ld.guns) drawGunItem(g, cam, t);
            }
            drawDoor(ld.door, cam, player);
            if (!player.enteringDoor || player.alpha > -1) {
                drawPlayer(player, cam, t);
            }
            if (player.enteringDoor && player.alpha < 1) {
                ctx.save();
                ctx.globalAlpha = Math.min(1, 1 - Math.max(0, player.alpha));
                ctx.fillStyle = '#000000';
                ctx.fillRect(ld.door.x - cam, ld.door.y, ld.door.w, ld.door.h);
                ctx.restore();
            }
            for (const en of ld.enemies) drawEnemy(en, cam, t);
            drawBullets(cam);
            drawParticles(cam);
            drawFloatingTexts(cam);

            // Door hint
            if (!ld.door.open) {
                const totalItems = ld.coins.length + ld.gems.length;
                const collected = ld.coins.filter(c => c.collected).length + ld.gems.filter(g => g.collected).length;
                const needed = Math.ceil(totalItems * 0.6);
                const bossDead = ld.enemies.every(e => !e.isBig || e.dead);
                const gunMandatory = (level === 2);

                                ctx.save();
                ctx.font = (lang === 'he' ? '18px' : '14px') + ' "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;
                const finalNeeded = (level === 1) ? 20 : (level === 2) ? 25 : (level === 3) ? 25 : (level === 4) ? 30 : (level === 5) ? 50 : needed;
                if (collected < finalNeeded) {
                    ctx.fillStyle = '#00eeff'; // Neon Cyan Diamond color
                    ctx.fillText(T('itemsLeft', Math.max(0, finalNeeded - collected)), W / 2, 50);
                } else if (!bossDead) {
                    ctx.fillStyle = '#ff4455';
                    const msg = (level === 5) ? T('killBossFinal') : T('killBoss');
                    ctx.fillText(msg, W / 2, 50);
                } else if (gunMandatory && !pl.hasGun) {
                    ctx.fillStyle = '#ffd700';
                    ctx.fillText(T('collectGun'), W / 2, 50);
                } else if (door.open) {
                    ctx.fillStyle = '#00ff44';
                    const msg = (level === 5) ? T('goDoorFinal') : T('goDoor');
                    ctx.fillText(msg, W / 2, 50);
                }
                ctx.restore();
            }

            // Overlay states
            if (state === 'dead') drawOverlayMsg(T('dead'), '#ff4455', T('pressSpace'));
            if (state === 'win' && level >= MAX_LEVELS) {
                drawOverlayMsg(T('victory'), '#ffd700', T('victoryScore'), winBgImg);
            } else if (state === 'win') {
                const img = (level === 1 || level === 3) ? level2BgImg : levelBgImg;
                drawOverlayMsg(T('win', level), '#00ffaa', T('nextLevel'), img);
            }
        }

        function drawOverlayMsg(title, color, sub, bgImg = null) {
            ctx.save();
            if (bgImg && bgImg.complete && bgImg.naturalWidth !== 0) {
                ctx.drawImage(bgImg, 0, 0, W, H);
                ctx.fillStyle = 'rgba(0,0,0,0.4)'; // Subtle darken to keep text readable
                ctx.fillRect(0, 0, W, H);
            } else {
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.fillRect(0, 0, W, H);
            }
            ctx.fillStyle = color;
            ctx.font = (lang === 'he' ? '28px' : '22px') + ' "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.fillText(title, W / 2, H / 2 - 20);
            ctx.font = (lang === 'he' ? '28px' : '22px') + ' "Press Start 2P"';
            ctx.fillStyle = '#ccc';
            ctx.font = (lang === 'he' ? '15px' : '10px') + ' "Press Start 2P"';
            ctx.fillText(sub, W / 2, H / 2 + 18);
            ctx.restore();
        }

        // ─── Game loop ────────────────────────────────────────────────────────────────
        let raf = null;
        let paused = false;
        function loop() {
            try {
                if (state === 'menu') {
                    raf = null;
                    return;
                }
                ctx.clearRect(0, 0, W, H);
                if (!paused) update();
                draw();
                if (paused) {
                    drawOverlayMsg(T('paused'), '#ffffff', T('unpause'), false);
                }
                raf = requestAnimationFrame(loop);
            } catch (err) {
                console.error("Game loop error:", err);
                raf = requestAnimationFrame(loop);
            }
        }

        // ─── Key: R = restart / next level ───────────────────────────────────────────
        document.addEventListener('keydown', e => {
            if (e.repeat) return;
            if (e.code === 'Escape' && state === 'playing') {
                paused = !paused;
                const ov = document.getElementById('overlay');
                const startBtn = document.getElementById('startBtn');
                const menuBtn = document.getElementById('menuBtn');
                const resumeBtn = document.getElementById('resumeBtn');
                
                if (paused) {
                    SND.pauseMusic();
                    ov.style.display = 'flex';
                    startBtn.style.display = 'none';
                    menuBtn.style.display = 'block';
                    resumeBtn.style.display = 'block';
                    menuBtn.innerText = T('backToMenu');
                    resumeBtn.innerText = T('resumeBtn');
                } else {
                    SND.resumeMusic();
                    ov.style.display = 'none';
                }
            }
            if (paused) return;
            if (e.code === 'Space') {
                if (state === 'dead') {
                    if (level === 2) globalHasGun = false;
                    enemiesKilled = 0;
                    initLevel(5);
                    state = 'playing';
                    SND.stopMusic(); SND.resumeMusic();
                } else if (state === 'win') {
                    if (level < MAX_LEVELS) {
                        level++;
                        initLevel();
                        state = 'playing';
                        SND.stopMusic(); SND.resumeMusic();
                    } else {
                        level = 1; enemiesKilled = 0;
                        globalHasSword = false; globalHasGun = false;
                        initLevel();
                        state = 'playing';
                        SND.init();
                    }
                }
            }
        });

        
        // ─── Menu button (Return to home) ───────────────────────────────────────────
        document.getElementById('menuBtn').addEventListener('click', () => {
            paused = false;
            state = 'menu';
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('menuTitle').style.display = 'block';
            document.getElementById('menuBtn').style.display = 'none';
            document.getElementById('resumeBtn').style.display = 'none';
            if (raf) {
                cancelAnimationFrame(raf);
                raf = null;
            }
            // Trigger menu loop
            (function menuLoop() {
                if (state === 'menu') {
                    drawStarsBg(t++);
                    requestAnimationFrame(menuLoop);
                }
            })();
        });

        // ─── Start button ─────────────────────────────────────────────────────────────
        document.getElementById('resumeBtn').addEventListener('click', () => {
            paused = false;
            document.getElementById('overlay').style.display = 'none';
            SND.resumeMusic();
        });

        function startGame() {
            if (state !== 'menu') return;
            SND.init();
            document.getElementById('overlay').style.display = 'none';
            level = 1; enemiesKilled = 0;
            globalHasGun = true;
            initLevel();
            state = 'playing';
            if (!raf) loop();
        }

        document.getElementById('startBtn').addEventListener('click', startGame);

        // Start the render loop (even before game starts, for menu animation)
        (function menuLoop() {
            if (state === 'menu') {
                drawStarsBg(t++);
                requestAnimationFrame(menuLoop);
            }
        })();
    </script>
</body>

</html>
